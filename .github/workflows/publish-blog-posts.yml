# Publicación por goteo del blog: 4 posts/semana (L, M, J y V), 1 por día.
#
# Solo publica posts en `status: pending` — los que pasaron la víspera por el
# email de revisión (workflow prepare-review.yml) y no fueron suspendidos.
# Si el revisor suspendió (status: hold), ese día no se publica nada.
#
# El cron de GitHub va en UTC y no entiende zonas horarias:
# 07:00 UTC = 09:00 en Madrid en verano (CEST) y 08:00 en invierno (CET).
#
# Los crons SOLO se ejecutan desde la rama por defecto (main). Para pausarlo:
# pestaña Actions → "Publicar posts del blog (drip)" → "Disable workflow".

name: Publicar posts del blog (drip)

on:
  schedule:
    - cron: '0 7 * * 1,2,4,5' # lunes, martes, jueves y viernes
  workflow_dispatch:
    inputs:
      mode:
        description: 'pending = publicar lo revisado (normal); draft = saltarse la revisión (emergencia)'
        type: choice
        options: [pending, draft]
        required: false
        default: pending
      count:
        description: 'Cuántos posts publicar (solo en modo draft)'
        required: false
        default: '1'
      dry_run:
        description: 'Solo mostrar qué se publicaría, sin commitear'
        type: boolean
        required: false
        default: false

permissions:
  contents: write

concurrency:
  group: publish-blog
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publicar lo pendiente de revisión
        id: publish
        run: |
          EXTRA=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then EXTRA="--dry-run"; fi
          node scripts/publish-next-posts.mjs \
            --from=${{ inputs.mode || 'pending' }} \
            --count=${{ inputs.count || '1' }} $EXTRA

      - name: Commit y push (dispara el deploy de Vercel)
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/content/blog
          if git diff --cached --quiet; then
            echo "Sin cambios: nada que publicar hoy."
          else
            git commit -m "feat(blog): publish ${{ steps.publish.outputs.slugs }}"
            git push
          fi

      - name: Borrar ramas de preview ya consumidas
        if: ${{ inputs.dry_run != true }}
        run: |
          git ls-remote --heads origin 'preview/*' | awk '{print $2}' | sed 's|refs/heads/||' | while read -r BRANCH; do
            echo "Borrando rama $BRANCH"
            git push origin --delete "$BRANCH" || true
          done
